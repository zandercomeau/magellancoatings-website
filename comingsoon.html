<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!--favicon-->
    <link rel="icon" type="image/x-icon" href="/assets/favico.ico">

    <style>
        html {
            background: linear-gradient(135deg, #0d47a1, #1976d2, #42a5f5);
        }
        body{
            font-family:'Poppins',sans-serif;
            background:transparent;
            min-height:100vh;
            display:flex;
            align-items:center;
            justify-content:center;
            color:#fff;
            overflow-x:hidden;
            overflow-y:auto;
            position:relative;
            padding:120px 20px 60px;
        }

        body::before{
            content:'';
            position:absolute;
            width:600px;
            height:600px;
            background:rgba(255,255,255,.08);
            border-radius:50%;
            top:-200px;
            left:-150px;
            filter:blur(20px);
            overflow-x:hidden;
            overflow-y:auto;
        }

        body::after{
            content:'';
            position:absolute;
            width:500px;
            height:500px;
            background:rgba(255,255,255,.05);
            border-radius:50%;
            bottom:-150px;
            right:-100px;
            filter:blur(20px);
            overflow-x:hidden;
            overflow-y:auto;
        }

        .coming-card{
            background:rgba(255,255,255,.12);
            backdrop-filter:blur(18px);
            border:1px solid rgba(255,255,255,.2);
            border-radius:25px;
            padding:60px 45px;
            max-width:750px;
            width:100%;
            text-align:center;
            box-shadow:0 20px 60px rgba(0,0,0,.25);
            z-index:5;
        }

        .logo-circle{
            width:100px;
            height:100px;
            margin:auto;
            border-radius:50%;
            display:flex;
            justify-content:center;
            align-items:center;
            margin-bottom:25px;
            box-shadow:0 10px 25px rgba(0,0,0,.25);
        }

        h1{
            font-weight:700;
            font-size:3rem;
        }

        .lead{
            opacity:.9;
            margin-bottom:40px;
        }

        .countdown{
            margin:35px 0;
        }

        .time-box{
            background:rgba(255,255,255,.15);
            border-radius:15px;
            padding:20px 10px;
            margin:10px;
            transition:.3s;
        }

        .time-box:hover{
            transform:translateY(-5px);
            background:rgba(255,255,255,.22);
        }

        .time{
            font-size:2rem;
            font-weight:700;
        }

        .label{
            text-transform:uppercase;
            font-size:.8rem;
            letter-spacing:1px;
            opacity:.8;
        }

        .form-control{
            border-radius:50px;
            border:none;
            padding:15px 20px;
        }

        .btn-primary{
            border-radius:50px;
            padding:15px 30px;
            background:#1565c0;
            border:none;
            transition:.3s;
        }

        .btn-primary:hover{
            background:#0d47a1;
            transform:translateY(-2px);
        }

        .social-icons a{
            color:white;
            font-size:1.5rem;
            margin:0 10px;
            transition:.3s;
        }

        .social-icons a:hover{
            color:#bbdefb;
            transform:translateY(-4px);
        }

        footer{
            margin-top:40px;
            opacity:.8;
            font-size:.9rem;
        }

        @media(max-width:768px){
            h1{
                font-size:2.2rem;
            }

            .coming-card{
                margin:20px;
                padding:40px 25px;
            }
        }
    </style>
</head>
<body>

<div class="coming-card">

    <div class="logo-circle">
        <img src="assets/img/logos/logo_bordered.png" alt="Magellan Coatings Ltd. logo" class="logo-circle">
    </div>

    <h1>Website Coming Soon</h1>

    <p class="lead">
        Our website is currently under construction.
         Contact us with the information below, or request a free quote on your next project.
    </p>

   <!-- Contact Information -->
<div class="my-5">

    <h3 class="mb-4">Contact Us</h3>

    <div class="row text-center">

        <div class="col-md-3 mb-4">
            <i class="bi bi-telephone-fill fs-2 mb-3"></i>
            <h5>Phone</h5>
            <p>604-849-0715</p>
        </div>

        <div class="col-md-6 mb-4">
            <i class="bi bi-envelope-fill fs-2 mb-3"></i>
            <h5>Email</h5>
            <p>
                <a href="mailto:magellancoatings@hotmail.com" class="text-white text-decoration-none text-center">
                    magellancoatings@hotmail.com
                </a>
            </p>
        </div>

        <div class="col-md-3 mb-4">
            <i class="bi bi-geo-alt-fill fs-2 mb-3"></i>
            <h5>Address</h5>
            <p>PO box 1429</p>
        </div>

    </div>

    <!-- Quote request form -->
    <h3 class="mb-4 m-5">Request a Free Quote</h3>

</div>

    <form action="https://formspree.io/f/mnjeppdp" method="POST" class="row g-3 mt-4">

    <div class="col-md-6">
        <label class="form-label">Full Name</label>
        <input
            type="text"
            class="form-control"
            name="name"
            placeholder="John Smith"
            required>
    </div>

    <div class="col-md-6">
        <label class="form-label">Phone Number</label>
        <input
            type="tel"
            class="form-control"
            name="phone"
            placeholder="(555) 123-4567"
            required>
    </div>

    <div class="col-12">
        <label class="form-label">Email Address</label>
        <input
            type="email"
            class="form-control"
            name="email"
            placeholder="john@example.com"
            required>
    </div>

    <div class="col-12">
        <label class="form-label">Service Needed</label>
        <select class="form-select" name="service" required>
            <option value="">Select a service...</option>
            <option>Interior Painting</option>
            <option>Exterior Painting</option>
            <option>Commercial Painting</option>
            <option>Cabinet Refinishing</option>
            <option>Deck & Fence Staining</option>
            <option>Other</option>
        </select>
    </div>

    <div class="col-12">
        <label class="form-label">Project Address (Optional)</label>
        <input
            type="text"
            class="form-control"
            name="address"
            placeholder="123 Main Street">
    </div>

    <div class="col-12">
        <label class="form-label">Project Details</label>
        <textarea
            class="form-control"
            name="message"
            rows="5"
            placeholder="Tell us about your painting project..."
            required></textarea>
    </div>

    <div class="col-12 d-grid">
        <button class="btn btn-primary btn-lg" type="submit">
            Request a Free Quote
        </button>
    </div>

</form>

</body>
</html>
